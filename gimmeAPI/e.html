<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        fetch("https://jsonplaceholder.typicode.com/posts/1")
        .then(data => console.log(data))
        fetch("https://jsonplaceholder.typicode.com/posts", {method:'POST', title: "Новый пост", body: "Содержимое поста", userId: 1 })
        .then(Response => console.log(Response))

        async function fetchData() {
        try {
            const response = await fetch("https://jsonplaceholder.typicode.com/nonexistent")
            const data = await response.json();
            console.log(data);
        } catch (error) {
            console.log('Ошибка:', error);
        }
        }
        fetchData(); 

        fetch("https://jsonplaceholder.typicode.com/posts/1", {method:'PUT', title: "Очень новый пост"})
        .then(data => console.log(data))
        fetch("https://jsonplaceholder.typicode.com/posts/1", {method:'DELETE'})
        .then(data => console.log(data))
        
        fetch("https://jsonplaceholder.typicode.com/comments", {method:'PUT', title:'User-Agent'})
        .then(data => console.log(data))
    </script>
</body>
</html>
