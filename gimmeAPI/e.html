<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        fetch("https://jsonplaceholder.typicode.com/posts/1")
        .then(response => response.json())
        .then(data => console.log("successfully reseaved the info:", data))

        fetch("https://jsonplaceholder.typicode.com/posts", {method:'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title: "Новый пост",  userId: 1 })})
        .then(Response => response.json())
        .then(data => console.log("successfully posted the info:", data))

        function fetchData() {
        try {
            const response = fetch("https://jsonplaceholder.typicode.com/nonexistent")
            const data = response.json();
        } catch (error) {
            console.error("error:", error);
        }
        }
        fetchData(); 

        fetch("https://jsonplaceholder.typicode.com/posts/1", {method:'PUT', headers: {'Content-Type': 'application/json'},  body:JSON.stringify({title: "Очень новый пост"})})
        .then(response => response.json())
        .then(data => console.log("successfully changed the info:", data))

        fetch("https://jsonplaceholder.typicode.com/posts/1", {method:'DELETE'})
        .then(response => response.json())
        .then(data => console.log("successfully deleted the info:", data))
        
        fetch("https://jsonplaceholder.typicode.com/comments", {method:'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title:'User-Agent'})})
        .then(response => response.json())
        .then(data => console.log("successfully changed the info:", data))
        .catch(error => console.error("ошибка:", error))
    </script>
</body>
</html>
