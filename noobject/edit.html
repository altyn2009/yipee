<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/credit.css">
</head>
<body>
    <header class="header">
        <a href="./index.html" class="header_logo">
            <img src=".\img\Logo.png" alt="Логотип" />
        </a>
        <nav class="header_nav">
            <ol class="header_nav-list">
                <li>
                    <a href="index.html" class="header_nav-link header_nav-link-active" aria-current="page">Новости</a>
                </li>
                <li>
                    <a href="./categories.html" class="header_nav-link">Категории</a>
                </li>
            </ol>
        </nav>
        <div class="header_auth">
            <a href="./login.html" class="button button-blue">Войти</a>
        </div>
    </header>
    <main>
        <form class="container">
            <h2 class="add-news">Редактирование новости</h2>
            <div class="box">
                <p class="news-паве">Название</p>
                <input
                class="name-input"
                type="text"
                placeholder="Bведите название">
            </div>
            <div class="box">
                <p class="news-category">Категория</p>
                <select class="category-input" name="category" id="category">
                    <option value="1">string</option>
                    <option value="2">Спорт</option>
                    <option value="3">Политика</option>
                </select>
            </div>
            <div class="box">
                <p class="news-cover"> Обложка</p>
                <input
                class="cover-input"
                type="file"
                >
            </div>
            <div class="box">
                <p class="news-content">Контент</p>
                <textarea
                    class="content-input"
                    cols="50"
                    rows="8">
                </textarea>
            </div>
            <button class="button button-blue">Сохранить новость</button>
        </form>
    </main>
    <script src="./js/edit.js"></script>
</body>
</html>
